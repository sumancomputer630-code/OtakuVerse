<html>
<head>
<meta charset="UTF-8">
<title>Anime Footer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Footer Styling */
.footer {
  background: #0f172a;
  color: #fff;
  padding: 40px 20px;
}

.footer-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  max-width: 1100px;
  margin: auto;
}

.footer-box {
  flex: 1 1 250px;
  margin: 10px;
}

.footer-box h2 {
  margin-bottom: 15px;
  color: #38bdf8;
}

.footer-box p {
  font-size: 14px;
  line-height: 1.6;
}

.footer-box ul {
  list-style: none;
  padding: 0;
}

.footer-box ul li {
  margin: 8px 0;
}

.footer-box ul li a {
  text-decoration: none;
  color: #ddd;
  transition: 0.3s;
}

.footer-box ul li a:hover {
  color: #38bdf8;
}

/* Social Icons */
.social a {
  display: inline-block;
  margin-right: 10px;
  color: #fff;
  font-size: 18px;
  transition: 0.3s;
}

.social a:hover {
  color: #38bdf8;
}

/* Bottom Bar */
.footer-bottom {
  text-align: center;
  margin-top: 30px;
  border-top: 1px solid #334155;
  padding-top: 15px;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<footer class="footer">
  <div class="footer-container">

    <!-- About -->
    <div class="footer-box">
      <h2>OtakuVerse</h2>
      <p>Your ultimate anime hub! Watch, explore and enjoy your favorite anime anytime.</p>
    </div>

    <!-- Contact -->
    <div class="footer-box">
      <h2>Contact</h2>
      <p>Email: support@otakuverse.com</p>
    </div>

    <!-- Social -->
    <div class="footer-box">
      <h2>Follow Us</h2>
      <div class="social">
        <a href="#">🌐</a>
        <a href="#">📺</a>
        <a href="#">📸</a>
        <a href="#">🐦</a>
      </div>
    </div>

  </div>
</footer>
</body>
</html>
